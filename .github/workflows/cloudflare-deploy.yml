name: Deploy to Cloudflare

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 优化：自动使用 package.json 中的 pnpm 版本
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      # 优化：缓存 pnpm 依赖
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      # 优化：使用 yq 工具修改 wrangler.toml（更安全）
      - name: Install yq (for TOML editing)
        uses: mikefarah/yq@v4
        with:
          version: 4.44.3

      - name: Configure D1 Database in wrangler.toml
        shell: bash
        run: |
          STORAGE_TYPE="${{ secrets.NEXT_PUBLIC_STORAGE_TYPE }}"
          if [ "$STORAGE_TYPE" != "d1" ]; then
            # 删除 D1 相关配置
            yq -i 'del(.d1_databases)' wrangler.toml
          elif [ -n "${{ secrets.D1_DATABASE_ID }}" ]; then
            # 替换 D1 数据库 ID
            yq -i '.d1_databases[0].database_id = "${{ secrets.D1_DATABASE_ID }}"' wrangler.toml
          else
            echo "D1_DATABASE_ID is required when STORAGE_TYPE is d1"
            exit 1
          fi

      - name: Update wrangler.toml [vars] section
        shell: bash
        run: |
          # 确保 [vars] 区块存在
          if ! grep -q '^\[vars\]' wrangler.toml; then
            echo "" >> wrangler.toml
            echo "[vars]" >> wrangler.toml
          fi
          
          # 定义需要添加的变量列表
          VARS=(
            "NEXT_PUBLIC_STORAGE_TYPE" "NEXT_PUBLIC_SITE_NAME" "NEXT_PUBLIC_SEARCH_MAX_PAGE"
            "NEXT_PUBLIC_DOUBAN_PROXY_TYPE" "NEXT_PUBLIC_DOUBAN_PROXY"
            "NEXT_PUBLIC_DOUBAN_IMAGE_PROXY_TYPE" "NEXT_PUBLIC_DOUBAN_IMAGE_PROXY"
            "NEXT_PUBLIC_DISABLE_YELLOW_FILTER" "NEXT_PUBLIC_FLUID_SEARCH"
            "NEXT_PUBLIC_PROXY_M3U8_TOKEN" "NEXT_PUBLIC_DANMAKU_CACHE_EXPIRE_MINUTES"
            "NEXT_PUBLIC_VOICE_CHAT_STRATEGY" "NEXT_PUBLIC_ENABLE_OFFLINE_DOWNLOAD"
            "NEXT_PUBLIC_ENABLE_SOURCE_SEARCH" "USERNAME" "PASSWORD"
            "UPSTASH_URL" "UPSTASH_TOKEN" "TMDB_API_KEY" "TMDB_PROXY"
            "TMDB_REVERSE_PROXY" "DANMAKU_API_BASE" "DANMAKU_API_TOKEN"
            "ANNOUNCEMENT" "CRON_PASSWORD" "SITE_BASE" "REDIS_URL"
            "KVROCKS_URL" "INIT_CONFIG" "CONFIG_SUBSCRIPTION_URL"
            "ENABLE_TVBOX_SUBSCRIBE" "TVBOX_SUBSCRIBE_TOKEN"
            "WATCH_ROOM_ENABLED" "WATCH_ROOM_EXTERNAL_SERVER_AUTH"
            "WATCH_ROOM_EXTERNAL_SERVER_URL" "WATCH_ROOM_SERVER_TYPE"
          )
          
          # 遍历变量并添加到 [vars] 区块
          for VAR in "${VARS[@]}"; do
            VALUE="${!VAR:-}"
            if [ -n "$VALUE" ]; then
              # 使用 yq 写入变量（避免转义问题）
              yq -i ".vars.$VAR = \"$VALUE\"" wrangler.toml
            fi
          done

      - name: Build for Cloudflare
        run: pnpm run build:cloudflare

      # 优化：指定 wrangler 版本，避免兼容性问题
      - name: Install Wrangler
        run: npm install -g wrangler@3.78.12

      - name: Run D1 Migrations
        run: |
          STORAGE_TYPE="${{ secrets.NEXT_PUBLIC_STORAGE_TYPE }}"
          if [ "$STORAGE_TYPE" != "d1" ] || [ -z "${{ secrets.D1_DATABASE_ID }}" ]; then
            echo "Skip D1 migrations"
            exit 0
          fi
          for f in ./migrations/*.sql; do
            if [ -f "$f" ]; then
              wrangler d1 execute moontvplus --remote --file="$f" || echo "Migration skipped"
            fi
          done

      - name: Deploy directly with Wrangler
        run: wrangler deploy
